<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Locker Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
background-size:300% 300%;
animation:gradientMove 8s infinite alternate;
overflow:hidden;
}

/* Animated Background */

@keyframes gradientMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* Floating Shapes */

.floating-shape{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
animation:float 6s infinite ease-in-out;
}

.floating-shape:nth-child(1){
width:120px;
height:120px;
top:10%;
left:10%;
}

.floating-shape:nth-child(2){
width:80px;
height:80px;
top:20%;
right:10%;
animation-delay:2s;
}

.floating-shape:nth-child(3){
width:100px;
height:100px;
bottom:15%;
left:20%;
animation-delay:4s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* Register Card */

.register-container{

background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:400px;
max-width:90%;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:30px;
color:#333;
}

/* Input Fields */

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input,
.input-group select{

width:100%;
padding:14px 40px;
border-radius:10px;
border:2px solid #eee;
outline:none;
transition:0.3s;
font-size:15px;
}

.input-group input:focus,
.input-group select:focus{

border-color:#ff758c;
box-shadow:0 0 10px rgba(255,117,140,0.4);

}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group select:focus + label{
top:-10px;
left:40px;
font-size:0.8rem;
color:#ff758c;
}

.input-group label{
position:absolute;
left:50px;
top:15px;
color:#999;
transition:0.3s;
pointer-events:none;
}

.input-group i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#888;
}

/* Show Password */

.toggle-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#777;
}

/* Button */

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{

transform:translateY(-2px);
box-shadow:0 10px 20px rgba(255,118,140,0.4);

}

.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.6);
transform:scale(0);
animation:ripple 0.6s linear;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

/* Error */

.error{
background:#ffe5e5;
color:#e74c3c;
padding:10px;
border-radius:6px;
margin-bottom:10px;
display:none;
}

/* Footer */

p{
margin-top:20px;
font-size:14px;
}

p a{
color:#ff758c;
text-decoration:none;
font-weight:600;
}

p a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div class="floating-shape"></div>
<div class="floating-shape"></div>
<div class="floating-shape"></div>
<div class="floating-shape"></div>

<div class="register-container">
<h2 id="typing-title"><i class="fas fa-user-plus"></i> <span id="typed-text"></span></h2>
<div id="error-msg" class="error" style="display:none;"></div>
<div class="input-group">
    <i class="fas fa-user"></i>
    <input type="text" id="username" placeholder=" Enter username" required>
    
</div>
<div class="input-group">
    <i class="fas fa-envelope"></i>
    <input type="email" id="email" placeholder=" Enter email" required>
    
</div>
<div class="input-group">
    <i class="fas fa-key"></i>
    <input type="password" id="password" placeholder=" Enter password" required>
    
</div>
<div class="input-group">
    <i class="fas fa-crown"></i>
    <select id="role">
        <option value="" disabled selected>Select Role</option>
        <option value="user">User</option>
        <option value="admin">Admin </option>
    </select>
    
</div>

<button onclick="createRipple(event); registerUser();">Register <i class="fas fa-rocket"></i></button>
<p>Already have an account? <a href="/login/">Login here</a></p>
</div>

<script>
async function registerUser(){
    const username=document.getElementById('username').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    const role=document.getElementById('role').value;
    const errorDiv=document.getElementById('error-msg');
    if(!username||!email||!password){
        errorDiv.textContent="Fill all fields";
        errorDiv.style.display="block";
        return;
    }
    errorDiv.style.display="none";
    try{
        const res=await fetch('/api/auth/register/',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,email,password,role})
        });
        const data=await res.json();
        if(res.status===201){
            alert('Registered! Login now.');
            window.location.href='/login/';
        }
        else{
            errorDiv.textContent=data.detail||JSON.stringify(data);
            errorDiv.style.display="block";
        }
    } catch(err){
        errorDiv.textContent="Server error";
        errorDiv.style.display="block";
        console.error(err);
    }
}

// Typing effect
const text = "Register for Smart Locker";
let index = 0;
function typeWriter() {
    if (index < text.length) {
        document.getElementById('typed-text').innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, 100);
    }
}
window.onload = typeWriter;

// Ripple effect
function createRipple(event) {
    const button = event.currentTarget;
    const circle = document.createElement('span');
    const diameter = Math.max(button.clientWidth, button.clientHeight);
    const radius = diameter / 2;
    circle.style.width = circle.style.height = `${diameter}px`;
    circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
    circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
    circle.classList.add('ripple');
    const ripple = button.getElementsByClassName('ripple')[0];
    if (ripple) {
        ripple.remove();
    }
    button.appendChild(circle);
}
</script>

</body>
</html>
